<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saman's Grand Vesak Zone</title>
    <style>
        body {
            margin: 0;
            background: #020208;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Thorana Title Style */
        .thorana-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ffaa00;
            animation: titlePulse 2s infinite alternate;
        }

        @keyframes titlePulse {
            0% { text-shadow: 0 0 10px #ff3300, 0 0 20px #ffaa00; filter: hue-rotate(0deg); }
            100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #0000ff; filter: hue-rotate(360deg); }
        }

        /* Main Pandal Centerstage */
        .pandal-display {
            position: relative;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, #200 20%, #000 80%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border: 4px solid #333;
        }

        /* Bulb Ring Array */
        .bulb-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .bulb {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #444;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
        }

        /* Audio Control Dashboard */
        .dashboard {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffcc00;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .btn-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .dash-btn {
            background: #222;
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        .dash-btn:active {
            background: #ffd700;
            color: #000;
        }

        /* Center Art Wrapper */
        .center-art {
            width: 180px;
            height: 180px;
            z-index: 10;
            background: #b35900;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 20px #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
        }
    </style>
</head>
<body>

    <div class="thorana-title">ඩිජිටල් වෙසක් කලාපය</div>

    <!-- The Animated Light Display -->
    <div class="pandal-display">
        <div class="bulb-ring" id="ring1"></div>
        <div class="center-art">🪔</div>
    </div>

    <!-- Control Systems -->
    <div class="dashboard">
        <h3>🎛️ Pandal Controller</h3>
        <p>Current Pattern: <span id="pattern-name" style="color: #00ffcc;">Wave Chaser</span></p>
        <div class="btn-panel">
            <button class="dash-btn" onclick="changePattern(0)">Pattern 1</button>
            <button class="dash-btn" onclick="changePattern(1)">Pattern 2</button>
        </div>
    </div>

    <script>
        const ring = document.getElementById('ring1');
        const totalBulbs = 24;
        const bulbsArray = [];
        let currentPattern = 0;
        let step = 0;

        // Math to arrange bulbs perfectly in a digital circle
        for (let i = 0; i < totalBulbs; i++) {
            const bulb = document.createElement('div');
            bulb.classList.add('bulb');
            
            const angle = (i / totalBulbs) * 2 * Math.PI;
            const radius = 145; // Distance from center
            const x = 160 + radius * Math.cos(angle);
            const y = 160 + radius * Math.sin(angle);
            
            bulb.style.left = `${x}px`;
            bulb.style.top = `${y}px`;
            
            ring.appendChild(bulb);
            bulbsArray.push(bulb);
        }

        // The Light Chaser engine logic loop
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
        
        function runChaser() {
            step++;
            bulbsArray.forEach((bulb, index) => {
                if (currentPattern === 0) {
                    // Pattern 1: Wave Chase effect
                    const colorIndex = (index + step) % colors.length;
                    bulb.style.background = colors[colorIndex];
                    bulb.style.boxShadow = `0 0 12px ${colors[colorIndex]}`;
                } else {
                    // Pattern 2: Alternating blocks flash
                    const group = Math.floor(index / 3) % 2;
                    const activeGroup = step % 2;
                    if (group === activeGroup) {
                        bulb.style.background = '#ff0055';
                        bulb.style.boxShadow = '0 0 15px #ff0055';
                    } else {
                        bulb.style.background = '#ffcc00';
                        bulb.style.boxShadow = '0 0 15px #ffcc00';
                    }
                }
            });
        }

        setInterval(runChaser, 150); // Speed of the electrical circuits

        function changePattern(num) {
            currentPattern = num;
            document.getElementById('pattern-name').innerText = num === 0 ? "Wave Chaser" : "Block Alternate";
        }
    </script>
</body>
</html>
