<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Digital Vesak Thorana</title>
    <style>
        body {
            margin: 0;
            background: #03020a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .title {
            color: #ffd700;
            font-size: 2rem;
            text-shadow: 0 0 15px #ff4500;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
        }

        /* --- THE THORANA FRAME STRUCTURE --- */
        .thorana-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 340px;
        }

        /* Top Crest (Siraspatha) */
        .siraspatha {
            width: 0;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 90px solid #200;
            position: relative;
            margin-bottom: 5px;
        }

        /* Main Center Frame */
        .main-pandal {
            width: 260px;
            height: 280px;
            background: #1a0000;
            border: 6px solid #ffd700;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.3);
        }

        /* Center Holy Art Display */
        .center-story {
            width: 160px;
            height: 180px;
            background: radial-gradient(circle, #ffcc00 0%, #b35900 100%);
            border: 4px solid #fff;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            box-shadow: 0 0 20px #ffaa00;
            z-index: 5;
        }

        /* Side Wings (Ashalpa) */
        .wing {
            position: absolute;
            width: 40px;
            height: 200px;
            background: #2a0000;
            border: 3px solid #ff4500;
            top: 40px;
        }
        .left-wing { left: -43px; border-radius: 20px 0 0 20px; }
        .right-wing { right: -43px; border-radius: 0 20px 20px 0; }

        /* --- BULB CIRCUIT STYLING --- */
        .bulb {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            transform: translate(-50%, -50%);
            transition: background 0.05s ease;
        }

        /* --- CONTROLLER DASHBOARD --- */
        .controls {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            border: 1px solid #333;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="title">මහා ඩිජිටල් වෙසක් තොරණ</div>

    <!-- The Grand Thorana Structure -->
    <div class="thorana-container">
        
        <!-- Top Tier -->
        <div class="siraspatha" id="topCrest"></div>
        
        <!-- Main Core -->
        <div class="main-pandal" id="outerRing">
            <div class="wing left-wing" id="leftWing"></div>
            
            <!-- Centerpiece Art -->
            <div class="center-story">🪔</div>
            
            <div class="wing right-wing" id="rightWing"></div>
        </div>
        
    </div>

    <!-- Pattern Controls -->
    <div class="controls">
        <div>Current Effect: <strong id="pattern-txt" style="color: #ffd700;">Rainbow Explosion</strong></div>
        <div class="btn-group">
            <button onclick="setPattern(0)">Pattern 1</button>
            <button onclick="setPattern(1)">Pattern 2</button>
            <button onclick="setPattern(2)">Pattern 3</button>
        </div>
    </div>

    <script>
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff'];
        let currentPattern = 0;
        let clock = 0;
        const allBulbs = [];

        // Helper to spawn bulbs safely into layers
        function deployBulbs(element, count, type, layoutFunc) {
            for (let i = 0; i < count; i++) {
                const bulb = document.createElement('div');
                bulb.classList.add('bulb');
                const coords = layoutFunc(i, count);
                bulb.style.left = coords.x;
                bulb.style.top = coords.y;
                element.appendChild(bulb);
                allBulbs.push({ element: bulb, index: i, type: type });
            }
        }

        // Layout Calculations for structural wiring
        // 1. Center Frame Circular Wire
        deployBulbs(document.getElementById('outerRing'), 32, 'center', (i, total) => {
            const angle = (i / total) * 2 * Math.PI;
            return { x: `${130 + 115 * Math.cos(angle)}px`, y: `${140 + 125 * Math.sin(angle)}px` };
        });

        // 2. Top Crest Triangle Wire
        deployBulbs(document.getElementById('topCrest'), 12, 'top', (i, total) => {
            if (i < total / 2) { // Left slope
                return { x: `${-70 + (i / (total/2)) * 70}px`, y: `${90 - (i / (total/2)) * 90}px` };
            } else { // Right slope
                const k = i - total/2;
                return { x: `${(k / (total/2)) * 70}px`, y: `${(k / (total/2)) * 90}px` };
            }
        });

        // 3. Side Wings Vertical Lines
        const wingLayout = (i, total) => ({ x: '20px', y: `${(i / total) * 200}px` });
        deployBulbs(document.getElementById('leftWing'), 8, 'left', wingLayout);
        deployBulbs(document.getElementById('rightWing'), 8, 'right', wingLayout);


        // --- THE ENGINE ROOM: CHASER SYSTEM ---
        function pulseEngine() {
            clock++;
            
            allBulbs.forEach(bulb => {
                let color = '#333';

                if (currentPattern === 0) {
                    // PATTERN 1: Rainbow Explosion / Dynamic Wave Chaser
                    let offset = bulb.type === 'center' ? 0 : bulb.type === 'top' ? 3 : 5;
                    let cIdx = (bulb.index + clock + offset) % colors.length;
                    color = colors[cIdx];
                    
                } else if (currentPattern === 1) {
                    // PATTERN 2: Cascading Columns Flashing
                    if (bulb.type === 'top' && clock % 3 === 0) color = '#ff0055';
                    else if (bulb.type === 'center' && clock % 3 === 1) color = '#00ffcc';
                    else if ((bulb.type === 'left' || bulb.type === 'right') && clock % 3 === 2) color = '#ffcc00';
                    
                } else if (currentPattern === 2) {
                    // PATTERN 3: Alternating Dual Pulse
                    let logic = (bulb.index + (bulb.type === 'left' ? 1 : 0)) % 2;
                    color = (logic === clock % 2) ? '#ffd700' : '#ff3300';
                }

                bulb.element.style.background = color;
                bulb.element.style.boxShadow = color !== '#333' ? `0 0 10px ${color}, 0 0 20px ${color}` : 'none';
            });
        }

        // Crank up the speed to 90ms for hyper-fast electric feel
        setInterval(pulseEngine, 90);

        function setPattern(num) {
            currentPattern = num;
            const names = ["Rainbow Explosion", "Cascading Columns", "Alternating Pulse"];
            document.getElementById('pattern-txt').innerText = names[num];
        }
    </script>
</body>
</html>
